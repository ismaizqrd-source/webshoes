<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Pedido confirmado! — Resell Your Order</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#0a0a0a;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.box{max-width:480px;width:100%;text-align:center}
.check{width:72px;height:72px;background:#0a0a0a;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem}
.check svg{width:36px;height:36px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
h1{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;margin-bottom:.75rem}
p{font-size:14px;color:#666;line-height:1.8;margin-bottom:2rem}
a{display:inline-block;padding:13px 32px;background:#0a0a0a;color:#fff;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600;text-decoration:none}
a:hover{background:#333}
</style>
</head>
<body>
<div class="box">
  <div class="check">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>¡Pedido<br>Confirmado!</h1>
  <p>Gracias por tu compra. Recibirás un email de confirmación en breve.<br>Tu pedido saldrá en <strong>24-48h</strong>.</p>
  <a href="/">Seguir comprando</a>
</div>
<script>
  // Limpiar carrito tras pago exitoso
  localStorage.removeItem('ryo_cart');
</script>
</body>
</html>
